services:
  app:
    build:
      context: ..
      dockerfile: .devcontainer/dockerfile

    volumes:
      # Sincroniza tu espacio de trabajo
      - ../..:/workspaces:cached
    # Mantiene el contenedor vivo para que VS Code pueda conectarse
    command: sleep infinity
    # Conecta la app directamente a la red del servicio 'db'
    network_mode: service:db

  db:
    image: postgres:17
    restart: unless-stopped
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5433:5432"
volumes:
  postgres-data:
